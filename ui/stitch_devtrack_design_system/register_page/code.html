<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - DevTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,700&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-background": "#e4e1ed",
                        "secondary-container": "#444956",
                        "on-primary": "#1000a9",
                        "surface-container-low": "#1b1b23",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffdcc5",
                        "surface": "#13131b",
                        "primary": "#c0c1ff",
                        "surface-container-highest": "#34343d",
                        "surface-dim": "#13131b",
                        "inverse-primary": "#494bd6",
                        "tertiary-fixed-dim": "#ffb783",
                        "tertiary-container": "#d97721",
                        "primary-fixed": "#e1e0ff",
                        "surface-bright": "#393841",
                        "primary-container": "#8083ff",
                        "surface-variant": "#34343d",
                        "outline": "#908fa0",
                        "on-secondary-fixed-variant": "#424754",
                        "secondary-fixed": "#dee2f3",
                        "outline-variant": "#464554",
                        "on-surface": "#e4e1ed",
                        "inverse-surface": "#e4e1ed",
                        "inverse-on-surface": "#303038",
                        "tertiary": "#ffb783",
                        "on-secondary-container": "#b4b8c8",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-fixed-dim": "#c2c6d7",
                        "on-surface-variant": "#c7c4d7",
                        "on-error-container": "#ffdad6",
                        "background": "#13131b",
                        "surface-container-high": "#292932",
                        "on-secondary": "#2b303d",
                        "secondary": "#c2c6d7",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#0d0096",
                        "on-tertiary": "#4f2500",
                        "surface-container-lowest": "#0d0d15",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-primary-fixed": "#07006c",
                        "surface-tint": "#c0c1ff",
                        "on-secondary-fixed": "#161b27",
                        "on-tertiary-fixed": "#301400",
                        "on-tertiary-container": "#452000",
                        "surface-container": "#1f1f27"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sidebar_width": "240px",
                        "container_padding": "24px",
                        "base_unit": "4px",
                        "navbar_height": "56px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "h3": ["DM Sans"],
                        "h1": ["DM Sans"],
                        "h2": ["DM Sans"],
                        "caption": ["Inter"],
                        "label-mono": ["JetBrains Mono"],
                        "body": ["Inter"],
                        "body-strong": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["20px", { "lineHeight": "28px", "letterSpacing": "0", "fontWeight": "700" }],
                        "h1": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-mono": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-strong": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .bg-grid-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex items-center justify-center relative overflow-hidden bg-grid-pattern">
<div class="grain-overlay"></div>
<main class="w-full max-w-[420px] px-4 relative z-20">
<!-- Logo Header -->
<div class="text-center mb-8 flex flex-col items-center">
<div class="w-12 h-12 bg-surface rounded-xl border border-outline-variant flex items-center justify-center mb-4 shadow-lg shadow-black/50">
<span class="material-symbols-outlined text-primary text-3xl font-bold" data-icon="tag" style="font-variation-settings: 'FILL' 1;">tag</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-2 tracking-tight">DevTrack</h1>
<p class="font-body text-body text-on-surface-variant">Create your account to get started</p>
</div>
<!-- Registration Card -->
<div class="bg-surface rounded-xl border border-outline-variant shadow-2xl p-6 sm:p-10 relative">
<form action="#" class="space-y-6" method="POST">
<!-- Role Selector -->
<div class="space-y-3">
<label class="block font-body-strong text-body-strong text-on-surface-variant">I am joining as a</label>
<div class="grid grid-cols-2 gap-3">
<button class="bg-primary/10 border border-primary text-primary font-body-strong text-body-strong py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
                            Team Lead
                        </button>
<button class="bg-surface-container-lowest border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-outline font-body-strong text-body-strong py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="terminal">terminal</span>
                            Developer
                        </button>
</div>
</div>
<!-- Inputs -->
<div class="space-y-4">
<!-- Full Name -->
<div>
<label class="sr-only" for="name">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder-outline font-label-mono text-label-mono focus:ring-1 focus:ring-primary focus:border-primary transition-colors h-[48px]" id="name" name="name" placeholder="Full Name" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="sr-only" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder-outline font-label-mono text-label-mono focus:ring-1 focus:ring-primary focus:border-primary transition-colors h-[48px]" id="email" name="email" placeholder="developer@company.com" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="sr-only" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder-outline font-label-mono text-label-mono focus:ring-1 focus:ring-primary focus:border-primary transition-colors h-[48px]" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="sr-only" for="confirm_password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder-outline font-label-mono text-label-mono focus:ring-1 focus:ring-primary focus:border-primary transition-colors h-[48px]" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-body-strong text-body-strong text-on-primary bg-primary hover:bg-primary-fixed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface transition-colors h-[48px] items-center" type="submit">
                        Create Account
                        <span class="material-symbols-outlined ml-2 text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-6 text-center">
<p class="font-body text-body text-on-surface-variant">
                    Already have an account? 
                    <a class="font-body-strong text-primary hover:text-primary-fixed transition-colors" href="#">Sign in</a>
</p>
</div>
</div>
<!-- Footer Note -->
<div class="mt-8 text-center">
<p class="font-caption text-caption text-outline">
                DevTrack — Built for dev teams. Not spreadsheets.
            </p>
</div>
</main>
</body></html>
