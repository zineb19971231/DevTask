<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DevTrack - Create New Project</title>

                        "on-error-container": "#ffdad6",
                        "surface-variant": "#34343d",
                        "on-error": "#690005",
                        "inverse-on-surface": "#303038",
                        "error": "#ffb4ab",

                        "sidebar_width": "240px",
                        "container_padding": "24px",
                        "gutter": "16px"

                    "fontFamily": {
                        "h2": ["DM Sans"],
                        "body-strong": ["Inter"],
                        "caption": ["Inter"],
                        "body": ["Inter"],
                        "h1": ["DM Sans"],

                        "h3": ["DM Sans"]

                    "fontSize": {
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-strong": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "16px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],

<style>
        .texture-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-background text-on-background font-body texture-bg antialiased min-h-screen flex items-center justify-center">
<!-- Main Overlay -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-[#161B27] border border-[#1E2535] rounded-xl w-full max-w-[520px] shadow-2xl relative flex flex-col">
<!-- Header -->
<div class="px-8 py-6 border-b border-[#1E2535] flex justify-between items-center">
<h2 class="font-h3 text-h3 text-white">Create New Project</h2>
<button class="text-on-surface-variant hover:text-white transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-8 space-y-6">
<!-- Project Title -->
<div class="space-y-2">
<label class="block font-body-strong text-body-strong text-on-surface">Project Title</label>
<input class="w-full h-12 bg-[#13131b] border border-[#1E2535] rounded-lg px-4 text-white font-label-mono text-label-mono placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" placeholder="e.g. Marrakech API v2" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block font-body-strong text-body-strong text-on-surface">Description</label>
<textarea class="w-full bg-[#13131b] border border-[#1E2535] rounded-lg p-4 text-white font-body text-body placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow resize-none" rows="3"></textarea>
</div>
<!-- Deadline -->
<div class="space-y-2">
<label class="block font-body-strong text-body-strong text-on-surface">Deadline</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="calendar_today">calendar_today</span>
<input class="w-full h-12 bg-[#13131b] border border-[#1E2535] rounded-lg pl-12 pr-4 text-white font-body text-body placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow cursor-pointer" placeholder="Select date" type="text"/>
</div>
</div>
<!-- Member Section -->
<div class="space-y-4 pt-2">
<label class="block font-body-strong text-body-strong text-on-surface">Invite developers by email</label>
<div class="flex gap-3">
<input class="flex-1 h-12 bg-[#13131b] border border-[#1E2535] rounded-lg px-4 text-white font-label-mono text-label-mono placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" placeholder="dev@company.com" type="email"/>
<button class="h-12 px-6 bg-surface-variant border border-[#1E2535] hover:border-primary text-white font-body-strong text-body-strong rounded-lg transition-colors flex items-center justify-center">
                            Add
                        </button>
</div>
<!-- Member Tags -->
<div class="flex flex-wrap gap-2 pt-2">
<!-- Tag 1 -->
<div class="flex items-center gap-2 bg-surface-container border border-outline-variant rounded-full py-1.5 pl-1.5 pr-3">
<img alt="Avatar" class="w-6 h-6 rounded-full object-cover" data-alt="A small circular avatar showing a professional portrait of a developer. Soft studio lighting against a dark minimal background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5DnnKXEQVVQ54LL_PnGtW9jC0LNGD4ILWgGtQmStnj5ToEyfJcWdudjG5NVD5FZJXsvfcHprsIEAojFMOH6wB5tjlmlZH4OzVEvPLu6k4V_nEFU8QxNA06CISzX8J2uGxbVeLuOgf6I4gXQp-2ClhBhzTB6zRpqNP3xfmvbMCnjRYFYBkHEGJp2Mjkm0vZV3SbFfYw0ZR0a5lANihb4axjLJ-uz-3WFNl-E5uSpKH5cfk9e7NitaMtdsku4U4m0KiGRWmhveWb0Js"/>
<span class="font-body text-body text-on-surface">sarah@devtrack.io</span>
<button class="text-on-surface-variant hover:text-white ml-1">
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
</div>
<!-- Tag 2 -->
<div class="flex items-center gap-2 bg-surface-container border border-outline-variant rounded-full py-1.5 pl-1.5 pr-3">
<img alt="Avatar" class="w-6 h-6 rounded-full object-cover" data-alt="A small circular avatar showing a professional portrait of a developer. Soft studio lighting against a dark minimal background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhIA1st5kFtjxN8rkXe-qo8CRJFO4r_v4pRnyklGAtJLjJqal9W9MEs6Lt87lMkQL9TCtzQIMesc0GWX4Bp3jlHLjbJHPVVkJKpmSYPEzodiuec6VeIvO2CxOq_Zeey8wHkNGPiQO3dCa70_XTWy8b7rUdENtT0odzhaEFDKr_kZPg6U2ce37EKh5uUmHN4LQvoEJzx44laM6gk71VRBAoTiWrJ4NGDXX_ZskML-EEujtbteg1uTXY17Y0C1ud8yJ12OK9HEeqfwRR"/>
<span class="font-body text-body text-on-surface">alex@devtrack.io</span>
<button class="text-on-surface-variant hover:text-white ml-1">
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-8 py-6 border-t border-[#1E2535] flex justify-between items-center bg-[#13131b] rounded-b-xl">
<button class="px-6 py-2.5 text-on-surface-variant hover:text-white font-body-strong text-body-strong transition-colors duration-200">
                    Cancel
                </button>
<button class="px-6 py-2.5 bg-inverse-primary hover:bg-primary hover:text-on-primary-fixed text-white font-body-strong text-body-strong rounded-[6px] transition-colors duration-200 shadow-sm">
                    Create Project
                </button>
</div>
</div>
</div>
</body></html>
