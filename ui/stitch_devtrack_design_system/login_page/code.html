<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "on-tertiary": "#4f2500",
                        "secondary": "#c2c6d7",
                        "surface-container-lowest": "#0d0d15",
                        "on-secondary-fixed-variant": "#424754",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-secondary-fixed": "#161b27",

                    fontFamily: {

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface-container-lowest text-on-surface font-body text-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(circle, #e4e1ed 1px, transparent 1px); background-size: 24px 24px;"></div>
<div class="w-full sm:w-[420px] bg-surface border border-surface-container-high rounded-xl p-[40px] relative z-10 shadow-2xl shadow-black/50">
<div class="mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-inverse-primary" style="font-size: 24px;">tag</span>
<h1 class="font-h2 text-h2 text-on-surface">DevTrack</h1>
</div>
<p class="font-body text-body text-outline">Sign in to your workspace</p>
</div>
<form class="space-y-6">
<div>
<label class="block font-label-mono text-label-mono text-on-surface-variant mb-2" for="email">EMAIL ADDRESS</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline pointer-events-none">mail</span>
<input class="w-full h-[48px] bg-surface-container-lowest border border-surface-container-high rounded-lg text-on-surface placeholder:text-outline focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary transition-all pl-12 pr-4 outline-none font-body text-body" id="email" placeholder="developer@devtrack.io" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-mono text-label-mono text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-mono text-label-mono text-inverse-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline pointer-events-none">lock</span>
<input class="w-full h-[48px] bg-surface-container-lowest border border-surface-container-high rounded-lg text-on-surface placeholder:text-outline focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary transition-all pl-12 pr-12 outline-none font-body text-body" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-[48px] bg-inverse-primary text-surface-container-lowest font-body-strong text-body-strong rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center mt-2" type="button">
                Sign in
            </button>
</form>
<div class="mt-8 text-center">
<p class="font-body text-body text-on-surface-variant">
                Don't have an account? 
                <a class="text-inverse-primary hover:underline ml-1" href="#">Register</a>
</p>
</div>
</div>
<div class="mt-12 text-center relative z-10">
<p class="font-caption text-caption text-outline">DevTrack — Built for dev teams. Not spreadsheets.</p>
</div>
</body></html>
